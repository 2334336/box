name: GENERATE APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag, e.g. v0.0.6-abi-split'
        required: true
        default: 'v0.0.6-abi-split'
      release_name:
        description: 'Release title'
        required: true
        default: 'Jade 按架构独立安装包'
      create_release:
        description: 'Whether to publish GitHub Release'
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease --build-cache --parallel --warning-mode all

      - name: Prepare APK
        id: prepare
        run: |
          mkdir -p "${{ github.workspace }}/apk"
          cp Release/Jade-v31-store-status-armeabi-v7a-release.apk "${{ github.workspace }}/apk/"
          cp Release/Jade-v31-store-status-arm64-v8a-release.apk "${{ github.workspace }}/apk/"
          ls -lah "${{ github.workspace }}/apk"
          test "$(find "${{ github.workspace }}/apk" -maxdepth 1 -name '*.apk' | wc -l | tr -d ' ')" = "2"
          echo "apk_count=2" >> "$GITHUB_OUTPUT"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jade-apk-by-abi
          path: ${{ github.workspace }}/apk/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ inputs.create_release && steps.prepare.outputs.apk_count != '0' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ github.workspace }}/apk/*
          body: |
            ## 变更
            - 修复「多源配置」输入链接点确定后出现空白白框、看不出状态的问题
            - 订阅过程在对话框内显示：等待 / 请求中 / 成功 / 失败
            - 设置页「多源配置」右侧显示当前配置摘要

            ## 安装
            - `armeabi-v7a`：32 位包，优先用于 Android 4.4 电视盒子
            - `arm64-v8a`：64 位包，用于 64 位电视、手机或模拟器

            两个 APK 按架构独立打包，不提供统一 universal APK。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
